<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sistema Escolar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-page {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364) !important;
        }
        .login-card {
            background: linear-gradient(145deg, rgba(0, 198, 255, 0.25), rgba(0, 120, 255, 0.15)) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3) !important;
        }
        .login-title, .login-subtitle {
            color: #ffffff;
        }
        .login-subtitle {
            opacity: 0.75;
        }
        .login-form .campo label {
            color: rgba(255, 255, 255, 0.85);
        }
        .login-form input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }
        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }
        .login-form input:focus {
            background: rgba(255, 255, 255, 0.18);
            border-color: #00c6ff;
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.25);
            outline: none;
        }
    </style>
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='logo_escola.png') }}" alt="Logo CQP" class="login-logo__img">
        </div>
        <h2 class="login-title">Sistema Escolar</h2>
        <p class="login-subtitle">Acesse com seu login e senha</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="campo">
                <label for="login">Login</label>
                <input type="text" id="login" name="login"
                       required autofocus autocomplete="username">
            </div>
            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha"
                       required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-azul login-btn">Entrar</button>
        </form>
    </div>
</div>

</body>
</html>
