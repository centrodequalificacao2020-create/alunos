<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

/* FUNDO */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* CARD */
.login-box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    padding:45px;
    border-radius:18px;
    width:350px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    text-align:center;
    color:#fff;
    position:relative;
}

/* BORDA */
.login-box::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;
    background: linear-gradient(120deg, #00c6ff, #00ff9d, #54a0ff);
    -webkit-mask: 
        linear-gradient(#000 0 0) content-box, 
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity:0.4;
    pointer-events: none;
}

/* TITULO */
.logo{
    font-size:20px;
    font-weight:600;
    margin-bottom:5px;
}

.sub{
    font-size:13px;
    opacity:0.7;
    margin-bottom:25px;
}

/* INPUT GROUP */
.input-group{
    position:relative;
}

/* INPUTS (CORRIGIDO) */
.login-box input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.95);
    font-size:14px;
    box-sizing:border-box;
}

/* BOTÃO (CORRIGIDO) */
.login-box button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
    display:block;
    box-sizing:border-box;
}

/* HOVER */
.login-box button:hover{
    transform: translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* CLICK */
.login-box button:active{
    transform: scale(0.97);
}

/* OLHO SENHA */
.toggle-senha{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:13px;
    color:#333;
}

/* FOOTER */
.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.6;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="logo">Centro de Qualificação Profissional</div>
    <div class="sub">Acesso ao sistema</div>

    <form method="POST">

        <input name="usuario" placeholder="Usuário" required>

        <div class="input-group">
            <input id="senha" name="senha" type="password" placeholder="Senha" required>
            <span class="toggle-senha" onclick="toggleSenha()">👁</span>
        </div>

        <button type="submit">Entrar</button>

    </form>

    <div class="footer">
        © Sistema interno
    </div>

</div>

<script>
function toggleSenha(){
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
