{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:40px auto;">

    <div class="card-header">
        <span>🔒</span>
        <h2>Alterar Senha</h2>
    </div>
    <p style="color:var(--color-text-muted); margin-bottom:20px;">
        Olá, <strong>{{ aluno.nome.split()[0] }}</strong>! Escolha uma senha com pelo menos 6 caracteres.
    </p>

    <form method="POST" action="/aluno/senha">

        <div class="form-group">
            <label>Senha atual</label>
            <input type="password" name="senha_atual" class="form-control" required
                   placeholder="Sua senha atual (CPF se nunca trocou)">
        </div>

        <div class="form-group">
            <label>Nova senha</label>
            <input type="password" name="nova_senha" id="novaSenha" class="form-control"
                   minlength="6" required placeholder="Mínimo 6 caracteres">
        </div>

        <div class="form-group">
            <label>Confirme a nova senha</label>
            <input type="password" name="confirma_senha" id="confirmaSenha" class="form-control"
                   minlength="6" required placeholder="Repita a nova senha">
            <small id="msgConferencia" style="font-size:12px;"></small>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px;">
            <button type="submit" class="btn btn-azul" id="btnSalvar">Salvar nova senha</button>
            <a href="/aluno/dashboard" class="btn btn-outline">Cancelar</a>
        </div>

    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const nova     = document.getElementById('novaSenha');
const confirma = document.getElementById('confirmaSenha');
const msg      = document.getElementById('msgConferencia');
const btn      = document.getElementById('btnSalvar');

function checar() {
    if (!confirma.value) { msg.textContent = ''; return; }
    if (nova.value === confirma.value) {
        msg.textContent = '\u2714 Senhas conferem';
        msg.style.color = '#2ecc71';
        btn.disabled = false;
    } else {
        msg.textContent = '\u2716 Senhas n\u00e3o conferem';
        msg.style.color = '#e74c3c';
        btn.disabled = true;
    }
}
nova.addEventListener('input', checar);
confirma.addEventListener('input', checar);
</script>
{% endblock %}
