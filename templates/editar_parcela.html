{% extends "base.html" %}
{% block title %}Editar Parcela{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Parcela</h2>
    </div>
    <form method="POST" class="form-pequeno">
        <div class="grid-2">
            <div class="campo">
                <label>Valor</label>
                <input type="number" step="0.01" name="valor" value="{{ parcela.valor }}" required>
            </div>
            <div class="campo">
                <label>Vencimento</label>
                <input type="date" name="vencimento" value="{{ parcela.vencimento }}" required>
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label>Tipo</label>
                <select name="tipo">
                    {% for t in ['Matrícula','Mensalidade','Material','Outros'] %}
                    <option value="{{ t }}" {% if parcela.tipo == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo">
                <label>Referência da parcela</label>
                <input type="text" name="parcela_ref" value="{{ parcela.parcela_ref or '' }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">Salvar</button>
            <a href="/financeiro" class="btn btn-vermelho">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
