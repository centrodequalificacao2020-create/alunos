{% extends "base.html" %}
{% block title %}Editar Parcela{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Parcela</h2>
    </div>

    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" name="valor"
                       step="0.01" min="0"
                       value="{{ parcela.valor }}" required>
            </div>
            <div class="campo">
                <label for="vencimento">Vencimento</label>
                <input type="date" id="vencimento" name="vencimento"
                       value="{{ parcela.vencimento }}" required>
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo">
                    {% for t in ['Matrícula','Mensalidade','Material','Outros'] %}
                    <option value="{{ t }}" {% if parcela.tipo == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo">
                <label for="parcela_ref">Referência</label>
                <input type="text" id="parcela_ref" name="parcela_ref"
                       value="{{ parcela.parcela_ref or '' }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/financeiro" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
