{% extends "base.html" %}
{% block title %}Editar Aluno{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Aluno</h2>
    </div>
    <p class="card-subtitle">{{ aluno.nome }}</p>

    <form method="POST">
        <div class="grid-1">
            <div class="campo">
                <label>Nome completo</label>
                <input type="text" name="nome" value="{{ aluno.nome }}" required>
            </div>
        </div>
        <div class="grid-4">
            <div class="campo">
                <label>CPF</label>
                <input type="text" name="cpf" value="{{ aluno.cpf or '' }}">
            </div>
            <div class="campo">
                <label>RG</label>
                <input type="text" name="rg" value="{{ aluno.rg or '' }}">
            </div>
            <div class="campo">
                <label>Data de nascimento</label>
                <input type="date" name="data_nascimento" value="{{ aluno.data_nascimento or '' }}">
            </div>
            <div class="campo">
                <label>Status</label>
                <select name="status">
                    {% for s in ['Ativo','Trancado','Cancelado','Finalizado'] %}
                    <option value="{{ s }}" {% if aluno.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-4">
            <div class="campo">
                <label>WhatsApp</label>
                <input type="text" name="telefone" value="{{ aluno.telefone or '' }}">
            </div>
            <div class="campo">
                <label>Telefone do responsável</label>
                <input type="text" name="telefone_contato" value="{{ aluno.telefone_contato or '' }}">
            </div>
            <div class="campo">
                <label>E-mail</label>
                <input type="email" name="email" value="{{ aluno.email or '' }}">
            </div>
        </div>
        <h3 class="secao">🏠 Endereço</h3>
        <div class="grid-4">
            <div class="campo">
                <label>CEP</label>
                <input type="text" name="cep" value="{{ aluno.cep or '' }}">
            </div>
            <div class="campo">
                <label>Bairro</label>
                <input type="text" name="bairro" value="{{ aluno.bairro or '' }}">
            </div>
            <div class="campo">
                <label>Cidade</label>
                <input type="text" name="cidade" value="{{ aluno.cidade or '' }}">
            </div>
            <div class="campo">
                <label>Estado</label>
                <input type="text" name="estado" value="{{ aluno.estado or '' }}">
            </div>
        </div>
        <div class="grid-4">
            <div class="campo grande">
                <label>Rua</label>
                <input type="text" name="endereco" value="{{ aluno.endereco or '' }}">
            </div>
            <div class="campo">
                <label>Complemento</label>
                <input type="text" name="complemento" value="{{ aluno.complemento or '' }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">Salvar Alterações</button>
            <a href="/cadastro" class="btn btn-vermelho">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
