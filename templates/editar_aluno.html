{% extends "base.html" %}
{% block title %}Editar Aluno{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cadastro.js') }}"></script>
{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Aluno</h2>
    </div>
    <p class="card-subtitle">{{ aluno.nome }}</p>

    <form method="POST">

        <div class="grid-1">
            <div class="campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" value="{{ aluno.nome }}" required>
            </div>
        </div>

        <div class="grid-4">
            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf"
                       value="{{ aluno.cpf or '' }}"
                       inputmode="numeric" placeholder="000.000.000-00">
            </div>
            <div class="campo">
                <label for="rg">RG</label>
                <input type="text" id="rg" name="rg"
                       value="{{ aluno.rg or '' }}"
                       inputmode="numeric">
            </div>
            <div class="campo">
                <label for="data_nascimento">Data de nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento"
                       value="{{ aluno.data_nascimento or '' }}">
            </div>
            <div class="campo">
                <label for="status">Status</label>
                <select id="status" name="status">
                    {% for s in ['Ativo','Trancado','Cancelado','Finalizado'] %}
                    <option value="{{ s }}" {% if aluno.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid-4">
            <div class="campo">
                <label for="telefone">WhatsApp</label>
                <input type="text" id="telefone" name="telefone"
                       value="{{ aluno.telefone or '' }}"
                       inputmode="numeric" placeholder="(00) 00000-0000">
            </div>
            <div class="campo">
                <label for="telefone_contato">Telefone do responsável</label>
                <input type="text" id="telefone_contato" name="telefone_contato"
                       value="{{ aluno.telefone_contato or '' }}"
                       inputmode="numeric">
            </div>
            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email"
                       value="{{ aluno.email or '' }}"
                       placeholder="aluno@email.com">
            </div>
        </div>

        <div id="bloco_responsavel" class="bloco-oculto">
            <h3 class="secao">👨‍👩‍👧 Responsável Legal</h3>
            <div class="grid-4">
                <div class="campo">
                    <label for="responsavel_nome">Nome do responsável</label>
                    <input type="text" id="responsavel_nome" name="responsavel_nome"
                           value="{{ aluno.responsavel_nome or '' }}">
                </div>
                <div class="campo">
                    <label for="responsavel_cpf">CPF do responsável</label>
                    <input type="text" id="responsavel_cpf" name="responsavel_cpf"
                           value="{{ aluno.responsavel_cpf or '' }}"
                           inputmode="numeric" placeholder="000.000.000-00">
                </div>
                <div class="campo">
                    <label for="responsavel_telefone">Telefone</label>
                    <input type="text" id="responsavel_telefone" name="responsavel_telefone"
                           value="{{ aluno.responsavel_telefone or '' }}"
                           inputmode="numeric">
                </div>
                <div class="campo">
                    <label for="responsavel_parentesco">Parentesco</label>
                    <input type="text" id="responsavel_parentesco" name="responsavel_parentesco"
                           value="{{ aluno.responsavel_parentesco or '' }}">
                </div>
            </div>
        </div>

        {% include 'partials/form_endereco.html' %}

        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar Alterações</button>
            <a href="/cadastro" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
