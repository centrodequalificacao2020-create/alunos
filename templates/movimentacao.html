{% extends "base.html" %}
{% block title %}Matrículas{% endblock %}
{% block content %}

{# mapa JS: curso_id -> tipo #}
<script>
const CURSO_TIPO = {{ curso_tipo | tojson }};
function preencherTipo(selectCurso, selectTipo) {
    const tipo = CURSO_TIPO[parseInt(selectCurso.value)] || "";
    for (let opt of selectTipo.options) {
        if (opt.value === tipo) { opt.selected = true; return; }
    }
    selectTipo.value = "";
}
document.addEventListener("DOMContentLoaded", function() {
    const sCursoMat = document.getElementById("curso_id_mat");
    const sTipoMat  = document.getElementById("tipo_curso_mat");
    if (sCursoMat && sCursoMat.value) preencherTipo(sCursoMat, sTipoMat);

    // Pré-matrícula: atualiza action do form quando o aluno é selecionado
    const selectAlunoPre = document.getElementById("aluno_id_pre");
    const formPre        = document.getElementById("form-pre-matricula");
    function atualizarActionPre() {
        const aid = selectAlunoPre.value;
        if (aid) {
            formPre.action = "/pre_matricula_pdf/" + aid;
        } else {
            formPre.action = "#";
        }
    }
    if (selectAlunoPre) {
        selectAlunoPre.addEventListener("change", atualizarActionPre);
        atualizarActionPre();
    }

    const sCursoPre = document.getElementById("curso_id_pre");
    const sTipoPre  = document.getElementById("tipo_curso_pre");
    if (sCursoPre && sCursoPre.value) preencherTipo(sCursoPre, sTipoPre);
});
</script>

<div class="grid-2" style="max-width:1400px; margin:0 auto;">

    <!-- Matrícula normal -->
    <div class="card">
        <div class="card-header">
            <span>📚</span>
            <h2>Confirmação de Matrícula</h2>
        </div>

        <form method="POST" action="/salvar_matricula">

            <div class="campo">
                <label for="aluno_id_mat">Aluno</label>
                <select id="aluno_id_mat" name="aluno_id" required>
                    <option value="">Selecione o aluno</option>
                    {% for a in alunos %}
                    <option value="{{ a.id }}" {% if aluno_id == a.id|string %}selected{% endif %}>{{ a.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="campo">
                <label for="curso_id_mat">Curso</label>
                <select id="curso_id_mat" name="curso_id" required
                        onchange="preencherTipo(this, document.getElementById('tipo_curso_mat'))">
                    <option value="">Selecione o curso</option>
                    {% for c in cursos %}
                    <option value="{{ c.id }}">{{ c.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="campo">
                <label for="tipo_curso_mat">Tipo do Curso</label>
                <select id="tipo_curso_mat" name="tipo_curso" required>
                    <option value="">Selecione</option>
                    {% for t in tipos %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>

            <h3 class="secao">💳 Matrícula</h3>
            <div class="grid-2">
                <div class="campo">
                    <label for="valor_matricula">Valor da Matrícula (R$)</label>
                    <input type="number" id="valor_matricula" name="valor_matricula" step="0.01" min="0"
                           placeholder="0,00">
                </div>
                <div class="campo">
                    <label for="data_matricula">Data do pagamento</label>
                    <input type="date" id="data_matricula" name="data_matricula">
                </div>
            </div>

            <h3 class="secao">📅 Mensalidade</h3>
            <div class="grid-2">
                <div class="campo">
                    <label for="valor_mensal">Valor da Mensalidade (R$)</label>
                    <input type="number" id="valor_mensal" name="valor_mensal" step="0.01" min="0"
                           placeholder="Deixe em branco = sem mensalidades">
                </div>
                <div class="campo">
                    <label for="data_primeira_mensalidade">Primeiro vencimento</label>
                    <input type="date" id="data_primeira_mensalidade" name="data_primeira_mensalidade">
                </div>
            </div>

            <div class="grid-2">
                <div class="campo">
                    <label for="parcelas">Qtd. Parcelas Mensalidade</label>
                    <input type="number" id="parcelas" name="parcelas" min="1"
                           placeholder="Deixe em branco = sem mensalidades">
                </div>
                <div class="campo">
                    <label for="parcelas_material">Qtd. Parcelas Material</label>
                    <input type="number" id="parcelas_material" name="parcelas_material" min="1"
                           placeholder="Obrigatório se houver material">
                </div>
            </div>

            <h3 class="secao">📚 Material Didático</h3>
            <div class="grid-2">
                <div class="campo">
                    <label for="valor_material">Valor do Material (R$)</label>
                    <input type="number" id="valor_material" name="valor_material" step="0.01" min="0"
                           placeholder="0,00">
                </div>
                <div class="campo">
                    <label for="data_material">Primeiro vencimento material</label>
                    <input type="date" id="data_material" name="data_material">
                </div>
            </div>

            <div class="campo">
                <label>Formato</label>
                <div class="material-opcoes">
                    <label class="material-card">
                        <input type="radio" name="material_didatico" value="Digital" checked>
                        <span>📱 Digital</span>
                    </label>
                    <label class="material-card">
                        <input type="radio" name="material_didatico" value="Físico">
                        <span>📘 Físico</span>
                    </label>
                </div>
            </div>

            <div class="campo">
                <label for="observacao_mat">Observações</label>
                <textarea id="observacao_mat" name="observacao" class="observacao-grande" placeholder="Opcional"></textarea>
            </div>

            <div class="botoes-matricula">
                <button type="submit" class="btn btn-azul">💾 Salvar Matrícula</button>
            </div>
        </form>
    </div>

    <!-- Pré-matrícula: gera apenas PDF, sem salvar no banco -->
    <div class="card">
        <div class="card-header">
            <span>📄</span>
            <h2>Confirmação de Pré-Matrícula</h2>
        </div>

        <form id="form-pre-matricula"
              method="POST"
              action="#"
              target="_blank"
              onsubmit="if(!document.getElementById('aluno_id_pre').value){alert('Selecione o aluno.');return false;}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="campo">
                <label for="aluno_id_pre">Aluno</label>
                <select id="aluno_id_pre" name="aluno_id_display" required>
                    <option value="">Selecione o aluno</option>
                    {% for a in alunos %}
                    <option value="{{ a.id }}">{{ a.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="campo">
                <label for="curso_id_pre">Curso</label>
                <select id="curso_id_pre" name="curso_id_display"
                        onchange="preencherTipo(this, document.getElementById('tipo_curso_pre'))">
                    <option value="">Selecione o curso</option>
                    {% for c in cursos %}
                    <option value="{{ c.id }}">{{ c.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="campo">
                <label for="tipo_curso_pre">Tipo do Curso</label>
                <select id="tipo_curso_pre" name="tipo_curso_display">
                    <option value="">Selecione</option>
                    {% for t in tipos %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid-2">
                <div class="campo">
                    <label for="vm_pre">Taxa de Matrícula (R$)</label>
                    <input type="number" id="vm_pre" name="taxa_matricula" step="0.01" min="0"
                           placeholder="0,00">
                </div>
                <div class="campo">
                    <label for="vms_pre">Valor da Mensalidade (R$)</label>
                    <input type="number" id="vms_pre" name="valor_mensalidade" step="0.01" min="0"
                           placeholder="0,00" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="campo">
                    <label for="parc_pre">Qtd. Parcelas Curso</label>
                    <input type="number" id="parc_pre" name="parcelas" min="1" value="1">
                </div>
                <div class="campo">
                    <label for="vmat_pre">Valor do Material (R$)</label>
                    <input type="number" id="vmat_pre" name="valor_material" step="0.01" min="0"
                           placeholder="0,00" value="0">
                </div>
            </div>

            <div class="grid-2">
                <div class="campo">
                    <label for="pmat_pre">Parcelas do Material</label>
                    <input type="number" id="pmat_pre" name="parcelas_material" min="1" value="1">
                </div>
                <div class="campo">
                    <label for="mat_tipo_pre">Material Didático</label>
                    <input type="text" id="mat_tipo_pre" name="material_didatico"
                           placeholder="Ex: Digital, Impresso">
                </div>
            </div>

            <div class="grid-2">
                <div class="campo">
                    <label for="dm_pre">Data pagamento matrícula</label>
                    <input type="date" id="dm_pre" name="data_pagamento_matricula">
                </div>
                <div class="campo">
                    <label for="dpm_pre">Primeira mensalidade</label>
                    <input type="date" id="dpm_pre" name="data_primeira_mensalidade">
                </div>
            </div>

            <div class="botoes-matricula">
                <button type="submit" class="btn btn-warning">📄 Gerar PDF Pré-Matrícula</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
