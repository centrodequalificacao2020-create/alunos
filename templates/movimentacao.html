{% extends "base.html" %}
{% block content %}

<div class="grid-2" style="max-width:1400px; margin:0 auto;">

    <!-- ================= MATRÍCULA NORMAL ================= -->
    <div class="card">
        <h2>Confirmação de Matrícula</h2>

        <form method="POST" action="/salvar_matricula" class="form-pequeno">

            <label>Aluno</label>
            <select name="aluno_id" required>
                <option value="">Selecione o aluno</option>
                {% for a in alunos %}
                    <option value="{{ a[0] }}" {% if aluno_id == a[0]|string %}selected{% endif %}>
                        {{ a[1] }}
                    </option>  
                {% endfor %}
            </select>

            <label>Curso</label>
            <select name="curso_id" required>
                <option value="">Selecione o curso</option>
                {% for c in cursos %}
                    <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <label>Tipo do Curso</label>
            <select name="tipo_curso" required>
                <option value="">Selecione</option>
                <option>Profissionalizante</option>
                <option>Técnico</option>
                <option>Graduação</option>
                <option>NR</option>
                <option>Pós-graduação</option>
                <option>EJA</option>
                <option>Livre</option>
                <option>Capacitação</option>
            </select>

            <!-- MATRÍCULA -->
            <div class="grid-2">
                <div>
                    <label>Valor da Matrícula</label>
                    <input type="number" step="0.01" name="valor_matricula">
                </div>

                <div>
                    <label>Data do pagamento da matrícula</label>
                    <input type="date" name="data_matricula">
                </div>
            </div>

            <!-- MENSALIDADE -->
            <div class="grid-2">
                <div>
                    <label>Valor da Mensalidade</label>
                    <input type="number" step="0.01" name="valor_mensal">
                </div>

                <div>
                    <label>Data da primeira mensalidade</label>
                    <input type="date" name="data_primeira_mensalidade">
                </div>
            </div>

            <!-- PARCELAS -->
            <div class="grid-2">
                <div>
                    <label>Quantidade de Parcelas (Mensalidade)</label>
                    <input type="number" name="parcelas" min="1" value="1">
                </div>

                <div>
                    <label>Parcelas do Material Didático</label>
                    <input type="number" name="parcelas_material" min="1" value="1">
                </div>
            </div>

            <!-- MATERIAL -->
            <div class="grid-2">
                <div>
                    <label>Valor do Material Didático</label>
                    <input type="number" step="0.01" name="valor_material">
                </div>

                <div>
                    <label>Data do primeiro material</label>
                    <input type="date" name="data_material">
                </div>
            </div>

            <label>Material Didático</label>
            <div class="material-opcoes">
                <label class="material-card">
                    <input type="radio" name="material_didatico" value="Digital" checked>
                    <span>📱 Digital</span>
                </label>

                <label class="material-card">
                    <input type="radio" name="material_didatico" value="Físico">
                    <span>📘 Físico</span>
                </label>
            </div>

            <label>Observações</label>
            <textarea name="observacao"
                      class="observacao-grande"
                      placeholder="Observações adicionais (opcional)"></textarea>

            <div class="botoes-matricula">
                <button type="submit" class="btn btn-azul">
                    💾 Salvar Matrícula
                </button>
            </div>

        </form>
    </div>

    <!-- ================= PRÉ-MATRÍCULA ================= -->
    <div class="card">
        <h2>Confirmação de Pré-Matrícula</h2>

        <form method="POST" action="/pre_matricula" target="_blank" class="form-pequeno">

            <label>Aluno</label>
            <select name="aluno_id" required>
                <option value="">Selecione o aluno</option>
                {% for a in alunos %}
                    <option value="{{ a[0] }}">{{ a[1] }}</option>
                {% endfor %}
            </select>

            <label>Curso</label>
            <select name="curso_id" required>
                <option value="">Selecione o curso</option>
                {% for c in cursos %}
                    <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <div class="grid-2">
                <div>
                    <label>Valor da Matrícula</label>
                    <input type="number" step="0.01" name="valor_matricula">
                </div>

                <div>
                    <label>Valor da Mensalidade</label>
                    <input type="number" step="0.01" name="valor_mensal">
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <label>Quantidade de Parcelas</label>
                    <input type="number" name="parcelas" min="1" value="1">
                </div>

                <div>
                    <label>Valor do Material Didático</label>
                    <input type="number" step="0.01" name="valor_material">
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <label>Parcelas do Material</label>
                    <input type="number" name="parcelas_material" min="1" value="1">
                </div>

                <div>
                    <label>Data do pagamento da matrícula</label>
                    <input type="date" name="data_matricula">
                </div>
            </div>

            <div class="grid-1">
                <label>Data do primeiro pagamento da mensalidade</label>
                <input type="date" name="data_primeira_mensalidade">
            </div>

            <label>Observações</label>
            <textarea name="observacao"
                      class="observacao-grande"></textarea>

            <div class="botoes-matricula">
                <button type="submit" class="btn btn-azul">
                    📄 Gerar Pré-Matrícula
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
