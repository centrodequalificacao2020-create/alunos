{% extends "base.html" %}
{% block title %}Editar Funcionário{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Funcionário</h2>
    </div>
    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ funcionario.nome }}" required>
            </div>
            <div class="campo">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo" value="{{ funcionario.cargo or '' }}">
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label for="login">Login</label>
                <input type="text" id="login" name="login" value="{{ funcionario.login or '' }}" autocomplete="off">
            </div>
            <div class="campo">
                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil">
                    {% for p in ['Administrador','Financeiro','Usuario','Instrutor'] %}
                    <option value="{{ p }}" {% if funcionario.perfil == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/funcionario" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
