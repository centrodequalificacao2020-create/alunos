{% extends "base.html" %}
{% block title %}Editar Funcionário{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Funcionário</h2>
    </div>
    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ funcionario.nome }}" required>
            </div>
            <div class="campo">
                <label for="usuario">Login (usuário)</label>
                <input type="text" id="usuario" name="usuario" value="{{ funcionario.usuario or '' }}" required autocomplete="off">
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil">
                    {% for p in ['admin', 'financeiro', 'secretaria', 'instrutor'] %}
                    <option value="{{ p }}" {% if funcionario.perfil == p %}selected{% endif %}>{{ p | capitalize }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" value="{{ funcionario.email or '' }}">
            </div>
        </div>
        <div class="campo">
            <label for="senha">Nova senha <small>(deixe em branco para não alterar)</small></label>
            <input type="password" id="senha" name="senha" autocomplete="new-password">
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/funcionarios" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
