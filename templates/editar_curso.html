{% extends "base.html" %}
{% block title %}Editar Curso{% endblock %}
{% block content %}

{% set TIPOS_CURSO = ['Profissionalizante','Técnico','Graduação','NR','Pós-graduação','EJA','Livre','Capacitação'] %}

<script>
function calcularTotal() {
    const mensal   = parseFloat(document.getElementById('valor_mensal').value)   || 0;
    const parcelas = parseFloat(document.getElementById('parcelas').value)        || 0;
    const total    = mensal * parcelas;
    document.getElementById('valor_total_display').value = total > 0
        ? 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})
        : 'R$ 0,00';
}
window.addEventListener('DOMContentLoaded', calcularTotal);
</script>

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Curso</h2>
    </div>
    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="nome">Nome do curso</label>
                <input type="text" id="nome" name="nome" value="{{ curso.nome }}" required>
            </div>
            <div class="campo">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione</option>
                    {% for t in TIPOS_CURSO %}
                    <option value="{{ t }}" {% if curso.tipo == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo">
                <label for="valor_mensal">Valor Mensal (R$)</label>
                <input type="number" id="valor_mensal" name="valor_mensal"
                       step="0.01" min="0" value="{{ curso.valor_mensal or 0 }}"
                       oninput="calcularTotal()">
            </div>
            <div class="campo">
                <label for="valor_matricula">Valor Matrícula (R$)</label>
                <input type="number" id="valor_matricula" name="valor_matricula"
                       step="0.01" min="0" value="{{ curso.valor_matricula or 0 }}">
            </div>
            <div class="campo">
                <label for="parcelas">Parcelas</label>
                <input type="number" id="parcelas" name="parcelas"
                       min="1" value="{{ curso.parcelas or 1 }}"
                       oninput="calcularTotal()">
            </div>
            <div class="campo">
                <label for="valor_total_display">Valor Total</label>
                <input type="text" id="valor_total_display" readonly
                       style="background:#f0f4ff; font-weight:600; color:#1a56db;"
                       value="R$ {{ '%.2f'|format(curso.valor_total or 0)|replace('.', ',') }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/cursos" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
