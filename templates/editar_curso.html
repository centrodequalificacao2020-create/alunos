{% extends "base.html" %}
{% block title %}Editar Curso{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Curso</h2>
    </div>
    <form method="POST" class="form-pequeno">
        <div class="grid-3">
            <div class="campo">
                <label>Nome do curso</label>
                <input type="text" name="nome" value="{{ curso.nome }}" required>
            </div>
            <div class="campo">
                <label>Carga Horária</label>
                <input type="text" name="carga_horaria" value="{{ curso.carga_horaria or '' }}">
            </div>
            <div class="campo">
                <label>Valor</label>
                <input type="number" step="0.01" name="valor" value="{{ curso.valor or '' }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">Salvar</button>
            <a href="/cursos" class="btn btn-vermelho">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
