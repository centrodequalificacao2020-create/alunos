{% extends "base.html" %}
{% block title %}Editar Curso{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Curso</h2>
    </div>
    <form method="POST">
        <div class="grid-3">
            <div class="campo">
                <label for="nome">Nome do curso</label>
                <input type="text" id="nome" name="nome" value="{{ curso.nome }}" required>
            </div>
            <div class="campo">
                <label for="carga_horaria">Carga Horária</label>
                <input type="text" id="carga_horaria" name="carga_horaria" value="{{ curso.carga_horaria or '' }}">
            </div>
            <div class="campo">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" name="valor" step="0.01" min="0" value="{{ curso.valor or '' }}">
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/cursos" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
