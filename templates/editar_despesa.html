{% extends "base.html" %}
{% block title %}Editar Despesa{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Despesa</h2>
    </div>
    <form method="POST" class="form-pequeno">
        <div class="grid-2">
            <div class="campo">
                <label>Descrição</label>
                <input type="text" name="descricao" value="{{ despesa.descricao }}" required>
            </div>
            <div class="campo">
                <label>Categoria</label>
                <select name="categoria">
                    {% for cat in ['Aluguel','Salário','Marketing','Material','Outros'] %}
                    <option value="{{ cat }}" {% if despesa.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label>Valor</label>
                <input type="number" step="0.01" name="valor" value="{{ despesa.valor }}" required>
            </div>
            <div class="campo">
                <label>Data</label>
                <input type="date" name="data" value="{{ despesa.data }}" required>
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">Salvar</button>
            <a href="/despesas" class="btn btn-vermelho">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
