{% extends "base.html" %}
{% block title %}Editar Despesa{% endblock %}

{% block styles %}
<style>
.campos-periodo { display: none; }
.campos-periodo.visivel { display: contents; }
.campos-data-avulsa { display: contents; }
.campos-data-avulsa.oculto { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="card" style="max-width:640px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Despesa</h2>
    </div>

    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome"
                       value="{{ despesa.descricao }}" required>
            </div>
            <div class="campo">
                <label for="tipo">Tipo</label>
                <select id="tipoDespesa" name="tipo" required>
                    <option value="fixa"     {% if despesa.tipo == 'fixa'     %}selected{% endif %}>Fixa (recorrente)</option>
                    <option value="variavel" {% if despesa.tipo != 'fixa' %}selected{% endif %}>Variável</option>
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" name="valor"
                       step="0.01" min="0"
                       value="{{ despesa.valor }}" required>
            </div>

            {# Data avulsa — variável #}
            <div class="campo campos-data-avulsa" id="campoDataAvulsa">
                <label for="data">Data do lançamento</label>
                <input type="date" id="data" name="data"
                       value="{{ despesa.data or '' }}">
            </div>

            {# Início — fixa #}
            <div class="campo campos-periodo" id="campoInicio">
                <label>Início da cobrança</label>
                <input type="month" name="data_inicio"
                       value="{{ despesa.data_inicio or '' }}">
            </div>

            {# Fim — fixa #}
            <div class="campo campos-periodo" id="campoFim">
                <label>Fim da cobrança</label>
                <input type="month" name="data_fim"
                       value="{{ despesa.data_fim or '' }}">
            </div>
        </div>
        <div class="campo">
            <label for="observacao">Observação</label>
            <input type="text" id="observacao" name="observacao"
                   value="{{ despesa.observacao or '' }}">
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/despesas" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const tipoDespesa     = document.getElementById('tipoDespesa');
const campoInicio     = document.getElementById('campoInicio');
const campoFim        = document.getElementById('campoFim');
const campoDataAvulsa = document.getElementById('campoDataAvulsa');

function atualizarCampos() {
    const isFixa = tipoDespesa.value === 'fixa';
    campoInicio.classList.toggle('visivel', isFixa);
    campoFim.classList.toggle('visivel', isFixa);
    campoDataAvulsa.classList.toggle('oculto', isFixa);
    campoInicio.querySelector('input').required = isFixa;
    campoFim.querySelector('input').required    = isFixa;
}

tipoDespesa.addEventListener('change', atualizarCampos);
atualizarCampos();
</script>
{% endblock %}
