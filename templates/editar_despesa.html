{% extends "base.html" %}
{% block title %}Editar Despesa{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
    <div class="card-header">
        <span>✏️</span>
        <h2>Editar Despesa</h2>
    </div>

    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" name="descricao"
                       value="{{ despesa.descricao }}" required>
            </div>
            <div class="campo">
                <label for="categoria">Categoria</label>
                <select id="categoria" name="categoria">
                    {% for cat in ['Aluguel','Salário','Marketing','Material','Outros'] %}
                    <option value="{{ cat }}" {% if despesa.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="campo">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" name="valor"
                       step="0.01" min="0"
                       value="{{ despesa.valor }}" required>
            </div>
            <div class="campo">
                <label for="data">Data</label>
                <input type="date" id="data" name="data"
                       value="{{ despesa.data }}" required>
            </div>
        </div>
        <div class="acoes-form">
            <button type="submit" class="btn btn-azul">💾 Salvar</button>
            <a href="/despesas" class="btn btn-vermelho">✖ Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
