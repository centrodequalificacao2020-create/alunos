{% extends "base.html" %}
{% block content %}

<div class="executivo">
    <div class="card" style="max-width:500px; margin:auto;">
        <h2>Editar despesa</h2>

        <form method="POST">

            <label>Descrição</label>
            <input type="text" name="descricao" value="{{ despesa.descricao }}" required>

            <label>Valor</label>
            <input type="number" step="0.01" name="valor" value="{{ despesa.valor }}" required>

            <label>Tipo</label>
            <select name="tipo">
                <option value="Fixa" {% if despesa.tipo == "Fixa" %}selected{% endif %}>Fixa</option>
                <option value="Variável" {% if despesa.tipo == "Variável" %}selected{% endif %}>Variável</option>
            </select>

            <label>Categoria</label>
            <input type="text" name="categoria" value="{{ despesa.categoria }}">

            <label>Data</label>
            <input type="date" name="data" value="{{ despesa.data }}" required>

            <label>Observação</label>
            <textarea name="observacao">{{ despesa.observacao }}</textarea>

            <button type="submit" class="btn btn-azul">
                Salvar alterações
            </button>

        </form>
    </div>
</div>

{% endblock %}
