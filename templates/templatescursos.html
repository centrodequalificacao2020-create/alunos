{% extends "base.html" %}
{% block title %}Cadastro de Cursos{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>📚 Cadastro de Cursos</h2>
    </div>
    <form method="POST">
        <div class="grid-2">
            <div class="campo">
                <label for="nome">Nome do curso</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Técnico em Logística" required>
            </div>
        </div>
        <div style="margin-top:16px">
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>
</div>

<h3 class="section-title" style="margin-top:28px">📋 Cursos cadastrados</h3>

{% if cursos %}
<div class="tabela-planilha">
    <table class="tabela-excel">
        <thead>
            <tr>
                <th>ID</th>
                <th>Curso</th>
            </tr>
        </thead>
        <tbody>
            {% for c in cursos %}
            <tr>
                <td>{{ c[0] }}</td>
                <td>{{ c[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="empty-state">Nenhum curso cadastrado ainda.</p>
{% endif %}
{% endblock %}
