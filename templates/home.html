{% extends "base.html" %}

{% block content %}

<style>

/* FUNDO PROFISSIONAL */
body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height:100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* INDICADOR SUPERIOR (ALUNOS) */
.indicador-topo{
    position:fixed;
    top:15px;
    left:20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    padding:8px 15px;
    border-radius:20px;
    color:#fff;
    font-size:13px;
    border:1px solid rgba(255,255,255,0.2);
    z-index:999;
    opacity:0.8;
}

.indicador-topo strong{
    color:#00ff9d;
}

/* HEADER */
.home-header{
    max-width:1200px;
    margin:auto;
    padding:30px 20px 10px;
    color:#fff;
}

.home-header h1{
    font-size:28px;
    font-weight:600;
}

.home-header p{
    opacity:0.7;
    margin-top:5px;
}

/* GRID */
.home-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:25px;
    max-width:1200px;
    margin:auto;
    padding:30px 20px 50px;
}

/* RESPONSIVO */
@media (max-width:1024px){
    .home-grid{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width:600px){
    .home-grid{
        grid-template-columns: 1fr;
    }
}

/* CARD (AGORA COM COR MELHORADA) */
.home-card{
    background: linear-gradient(145deg, rgba(0, 198, 255, 0.25), rgba(0, 120, 255, 0.15));
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    transition:0.35s;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    position:relative;
    overflow:hidden;
}

/* EFEITO DE LUZ */
.home-card::before{
    content:'';
    position:absolute;
    width:150%;
    height:150%;
    top:-50%;
    left:-50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
    opacity:0;
    transition:0.4s;
}

.home-card:hover::before{
    opacity:1;
}

/* HOVER (MAIS VIVO) */
.home-card:hover{
    transform: translateY(-8px) scale(1.04);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    background: linear-gradient(145deg, rgba(0, 198, 255, 0.45), rgba(0, 120, 255, 0.25));
}

/* ÍCONE */
.home-card i{
    font-size:42px;
    margin-bottom:15px;
    display:block;
    transition:0.3s;
}

/* ANIMAÇÃO ÍCONE */
.home-card:hover i{
    transform: scale(1.2) rotate(5deg);
}

/* TEXTO */
.home-card span{
    font-weight:600;
    font-size:17px;
    color:#ffffff;
    letter-spacing:0.5px;
}

/* CORES DOS ÍCONES */
.c1{color:#00c6ff;}
.c2{color:#00ff9d;}
.c3{color:#ffd700;}
.c4{color:#ff4d4d;}
.c5{color:#c77dff;}
.c6{color:#00e5ff;}
.c7{color:#ff9f43;}
.c8{color:#ffffff;}
.c9{color:#1dd1a1;}
.c10{color:#ff6b6b;}
.c11{color:#54a0ff;}
.c12{color:#a29bfe;}

</style>

<!-- INDICADOR -->
<div class="indicador-topo">
    👥 {{ total_alunos or 0 }} alunos ativos
</div>

<!-- HEADER -->
<div class="home-header">
    <h1>Centro de Qualificação Prossional</h1>
    <p>
        Olá, {{ session.get('usuario_nome', 'Usuário') }} 👋<br>
    </p>
</div>

<!-- GRID -->
<div class="home-grid">

    <div class="home-card" onclick="location.href='/cadastro'">
        <i class="fas fa-user-graduate c1"></i>
        <span>Alunos</span>
    </div>

    <div class="home-card" onclick="location.href='/movimentacao'">
        <i class="fas fa-file-signature c2"></i>
        <span>Matrícula</span>
    </div>

    <div class="home-card" onclick="location.href='/financeiro'">
        <i class="fas fa-dollar-sign c3"></i>
        <span>Financeiro</span>
    </div>

    <div class="home-card" onclick="location.href='/dashboard'">
        <i class="fas fa-chart-line c4"></i>
        <span>Dashboard</span>
    </div>

    <div class="home-card" onclick="location.href='/notas'">
        <i class="fas fa-clipboard-list c5"></i>
        <span>Notas</span>
    </div>

    <div class="home-card" onclick="location.href='/frequencia'">
        <i class="fas fa-calendar-check c6"></i>
        <span>Frequência</span>
    </div>

    <div class="home-card" onclick="location.href='/materias'">
        <i class="fas fa-book c7"></i>
        <span>Matérias</span>
    </div>

    <div class="home-card" onclick="location.href='/cursos'">
        <i class="fas fa-graduation-cap c8"></i>
        <span>Cursos</span>
    </div>

    <div class="home-card" onclick="location.href='/despesas'">
        <i class="fas fa-receipt c9"></i>
        <span>Despesas</span>
    </div>

    <div class="home-card" onclick="location.href='/novo_funcionario'">
        <i class="fas fa-users c10"></i>
        <span>Funcionários</span>
    </div>

    <div class="home-card" onclick="location.href='/relatorio'">
        <i class="fas fa-chart-pie c11"></i>
        <span>Relatórios</span>
    </div>

    <div class="home-card" onclick="location.href='/logout'">
        <i class="fas fa-sign-out-alt c12"></i>
        <span>Sair</span>
    </div>

</div>

{% endblock %}
