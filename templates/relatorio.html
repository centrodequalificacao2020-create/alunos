{% extends "base.html" %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="card" style="margin-bottom:20px;">
    <h2>📊 Relatório Comercial</h2>
</div>

<!-- TOPO -->
<div class="card" style="display:flex; gap:10px; flex-wrap:wrap;">

    <div>
        <label>Mês</label>
        <input type="month" id="mes_ref">
    </div>

    <div>
        <label>Trimestre</label>
        <select id="trimestre">
            <option value="">--</option>
            <option value="1">1º</option>
            <option value="2">2º</option>
            <option value="3">3º</option>
            <option value="4">4º</option>
        </select>
    </div>

    <!-- META INTELIGENTE -->
    <div>
        <label>Meta %</label>
        <select id="meta_percentual">
            <option value="0.30">30%</option>
            <option value="0.35" selected>35%</option>
            <option value="0.40">40%</option>
        </select>
    </div>

    <button onclick="carregarMes()" class="btn-padrao">📂 Carregar</button>
    <button onclick="carregarTrimestre()" class="btn-padrao" style="background:#9b59b6;">📊 Trimestre</button>
    <button onclick="salvarBanco()" class="btn-padrao" style="background:#2ecc71;">💾 Salvar</button>

</div>

<!-- LEADS -->
<div class="card" style="margin-top:20px;">
    <h3>Leads</h3>

    <div class="grid-3">
        <input type="number" id="meta" placeholder="Meta Leads">
        <input type="number" id="realizado" placeholder="Leads Realizados">
        <input type="number" id="matriculas" placeholder="Matrículas">
    </div>

    <div class="grid-4">
        <div class="box"><span>% Captação</span><strong id="percentual"></strong></div>
        <div class="box"><span>Conversão</span><strong id="conversao"></strong></div>
        <div class="box"><span>Status</span><strong id="status_leads"></strong></div>
        <div class="box"><span>Comparação</span><strong id="comparacao"></strong></div>
    </div>
</div>

<!-- VENDAS -->
<div class="card" style="margin-top:20px;">
    <h3>Vendas</h3>

    <div class="grid-3">
        <div class="box">
            <span>Meta de Matrículas</span>
            <strong id="meta_alunos"></strong>
        </div>

        <input type="number" id="matriculas_venda" placeholder="Matrículas Realizadas">

        <div class="box destaque">
            <span>% Atingido</span>
            <strong id="percentual_venda"></strong>
        </div>
    </div>

    <div class="box" style="margin-top:15px;">
        <strong id="faltando"></strong>
    </div>
</div>

<!-- GRÁFICO -->
<div class="card" style="margin-top:20px;">
    <h3>📊 Desempenho</h3>
    <canvas id="grafico" height="100"></canvas>
</div>

<style>
.grid-3 { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
.grid-4 { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
input, select { padding:10px; border:1px solid #ddd; border-radius:8px; }
.box { background:#f8f9fa; padding:10px; border-radius:8px; text-align:center; }
.destaque { background:#2c3e50; color:white; }
.btn-padrao { padding:10px; border:none; border-radius:8px; background:#3498db; color:white; cursor:pointer; }
</style>

<script>

function getMesAtual() {
    return document.getElementById('mes_ref').value;
}

/* ===== CALCULAR ===== */
function calcular() {

    let meta = parseFloat(metaEl.value)||0;
    let realizado = parseFloat(realizadoEl.value)||0;
    let matriculas = parseFloat(matriculasEl.value)||0;

    let perc = document.getElementById("meta_percentual").value;

    percentualEl.innerText = meta>0?((realizado/meta)*100).toFixed(0)+"%":"0%";
    let conv = realizado>0?((matriculas/realizado)*100):0;
    conversaoEl.innerText = conv.toFixed(0)+"%";

    if(realizado>=meta){statusEl.innerText="Meta Batida";statusEl.style.color="#2ecc71";}
    else if(realizado>=meta*0.7){statusEl.innerText="Atenção";statusEl.style.color="#f39c12";}
    else{statusEl.innerText="Crítico";statusEl.style.color="#e74c3c";}

    // META INTELIGENTE
    let metaAuto=Math.round(realizado * perc);
    metaAlunosEl.innerText=metaAuto;

    let matA=parseFloat(matriculasVendaEl.value)||0;

    percentualVendaEl.innerText=metaAuto>0?((matA/metaAuto)*100).toFixed(0)+"%":"0%";

    let diff=matA-metaAuto;

    if(diff>0){faltandoEl.innerText="+"+diff+" Acima";faltandoEl.style.color="#2ecc71";}
    else if(diff<0){faltandoEl.innerText=diff+" Abaixo";faltandoEl.style.color="#e74c3c";}
    else{faltandoEl.innerText="Meta OK";}

    atualizarGrafico(meta, realizado, matriculas);
}

/* ===== GRÁFICO ===== */
let grafico;

function atualizarGrafico(meta, realizado, matriculas) {

    const ctx = document.getElementById('grafico');

    if (grafico) grafico.destroy();

    grafico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Meta Leads', 'Leads', 'Matrículas'],
            datasets: [{
                data: [meta, realizado, matriculas]
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
}

/* ===== SALVAR ===== */
function salvarBanco(){
    fetch("/salvar_relatorio",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            mes:getMesAtual(),
            meta:metaEl.value,
            realizado:realizadoEl.value,
            matriculas:matriculasEl.value,
            matriculas_venda:matriculasVendaEl.value
        })
    }).then(()=>alert("Salvo!"));
}

/* ===== CARREGAR MÊS ===== */
function carregarMes(){
    fetch("/carregar_relatorio/"+getMesAtual())
    .then(r=>r.json())
    .then(d=>{
        if(d.meta!=undefined){
            metaEl.value=d.meta;
            realizadoEl.value=d.realizado;
            matriculasEl.value=d.matriculas;
            matriculasVendaEl.value=d.matriculas_venda;
        }
        calcular();
    });
}

/* ===== TRIMESTRE ===== */
function carregarTrimestre(){

    let tri=document.getElementById("trimestre").value;
    let ano=getMesAtual().split("-")[0];

    if(!tri){alert("Selecione trimestre");return;}

    fetch(`/relatorio_trimestre/${ano}/${tri}`)
    .then(r=>r.json())
    .then(d=>{
        metaEl.value=d.meta||0;
        realizadoEl.value=d.realizado||0;
        matriculasEl.value=d.matriculas||0;
        matriculasVendaEl.value=d.matriculas_venda||0;
        calcular();
    });
}

/* ===== ELEMENTOS ===== */
const metaEl=document.getElementById('meta');
const realizadoEl=document.getElementById('realizado');
const matriculasEl=document.getElementById('matriculas');
const matriculasVendaEl=document.getElementById('matriculas_venda');

const percentualEl=document.getElementById('percentual');
const conversaoEl=document.getElementById('conversao');
const statusEl=document.getElementById('status_leads');
const comparacaoEl=document.getElementById('comparacao');

const metaAlunosEl=document.getElementById('meta_alunos');
const percentualVendaEl=document.getElementById('percentual_venda');
const faltandoEl=document.getElementById('faltando');

/* ===== START ===== */
window.onload=function(){
    document.getElementById('mes_ref').value=new Date().toISOString().slice(0,7);

    document.querySelectorAll("input, select").forEach(i=>{
        i.addEventListener("input",calcular);
    });

    carregarMes();
}

</script>

{% endblock %}
