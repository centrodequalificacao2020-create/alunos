# Nginx — proxy reverso para o CQP
# Serve arquivos estáticos diretamente (sem passar pelo Python)

server {
    listen 80;
    server_name _;

    # Compressão gzip para HTML, CSS e JS
    gzip on;
    gzip_types text/plain text/css application/javascript;

    # Arquivos estáticos: servidos pelo Nginx diretamente, sem tocar no Gunicorn
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Todo o resto vai para o Gunicorn
    location / {
        proxy_pass         http://web:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
    }
}
